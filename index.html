<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Lotto Draw</title>
    <style>
        :root {
            /* 고급스러운 컬러 팔레트 */
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2d3436;
            --text-sub: #636e72;
            
            /* 로또 공 색상 (파스텔톤으로 순화) */
            --ball-1: #ffd32a; /* 1-10 */
            --ball-2: #34e7e4; /* 11-20 */
            --ball-3: #ff5e57; /* 21-30 */
            --ball-4: #d2dae2; /* 31-40 */
            --ball-5: #05c46b; /* 41-45 */
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: var(--primary-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* 배경 장식용 원 */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: -1;
        }
        body::before { width: 300px; height: 300px; top: -100px; left: -100px; }
        body::after { width: 200px; height: 200px; bottom: -50px; right: -50px; }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 550px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 2.2rem;
            letter-spacing: -1px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-sub);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .results-wrapper {
            margin-bottom: 2rem;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lotto-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 15px;
            opacity: 0;
            transform: scale(0.9);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        .ball {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        /* 하이라이트 효과 */
        .ball::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 8px;
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .ball.r1 { background-color: var(--ball-1); color: #574b16; }
        .ball.r2 { background-color: var(--ball-2); color: #1b5e5d; }
        .ball.r3 { background-color: var(--ball-3); }
        .ball.r4 { background-color: var(--ball-4); color: #4b5563; }
        .ball.r5 { background-color: var(--ball-5); }

        .set-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #bdc3c7;
            margin-right: 10px;
            width: 30px;
        }

        #generate-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        #generate-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(118, 75, 162, 0.4);
        }

        #generate-btn:active {
            transform: translateY(-1px);
        }

        .placeholder-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 320px;
            color: #d1d8e0;
        }

        .placeholder-text svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            fill: currentColor;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lotto Premium</h1>
    <p class="subtitle">오늘의 행운을 지금 확인해보세요</p>
    
    <div id="results-container" class="results-wrapper">
        <div class="placeholder-text">
            <svg viewBox="0 0 24 24"><path d="M12,2A10,10,0,1,0,22,12,10,10,0,0,0,12,2Zm0,18a8,8,0,1,1,8-8A8,8,0,0,1,12,20ZM11,12V7h2v5h5v2H13v5H11V14H6V12Z"/></svg>
            <span>버튼을 눌러 행운을 잡으세요</span>
        </div>
    </div>

    <button id="generate-btn">신규 번호 추첨하기</button>
</div>

<script>
    const btn = document.getElementById('generate-btn');
    const container = document.getElementById('results-container');

    function getRangeClass(num) {
        if (num <= 10) return 'r1';
        if (num <= 20) return 'r2';
        if (num <= 30) return 'r3';
        if (num <= 40) return 'r4';
        return 'r5';
    }

    function generateLotto() {
        const numbers = new Set();
        while (numbers.size < 6) {
            numbers.add(Math.floor(Math.random() * 45) + 1);
        }
        return Array.from(numbers).sort((a, b) => a - b);
    }

    function render() {
        container.innerHTML = '';
        
        for (let i = 0; i < 5; i++) {
            const row = document.createElement('div');
            row.className = 'lotto-row';
            row.style.animationDelay = `${i * 0.08}s`;
            
            const label = document.createElement('span');
            label.className = 'set-label';
            label.textContent = `${i + 1}SET`;
            row.appendChild(label);

            const nums = generateLotto();
            nums.forEach(n => {
                const ball = document.createElement('div');
                ball.className = `ball ${getRangeClass(n)}`;
                ball.textContent = n;
                row.appendChild(ball);
            });
            
            container.appendChild(row);
        }
    }

    btn.addEventListener('click', render);
</script>

</body>
</html>
