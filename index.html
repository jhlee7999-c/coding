<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>깔끔한 로또 번호 추첨기</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary-color: #4a90e2;
            --text-color: #333333;
            --ball-yellow: #fbc400;
            --ball-blue: #69c8f2;
            --ball-red: #ff7272;
            --ball-gray: #aaaaaa;
            --ball-green: #b0d840;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            margin-bottom: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .lotto-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            box-shadow: inset -3px -3px 5px rgba(0,0,0,0.1), 2px 2px 5px rgba(0,0,0,0.1);
        }

        .ball.range-1 { background-color: var(--ball-yellow); }
        .ball.range-2 { background-color: var(--ball-blue); }
        .ball.range-3 { background-color: var(--ball-red); }
        .ball.range-4 { background-color: var(--ball-gray); }
        .ball.range-5 { background-color: var(--ball-green); }

        #generate-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            width: 100%;
        }

        #generate-btn:hover {
            background-color: #357abd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }

        #generate-btn:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 2rem;
            min-height: 280px;
        }

        .placeholder {
            color: #ccc;
            margin-top: 100px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lotto Luck!</h1>
    <div id="results-container" class="results">
        <div class="placeholder">추첨 버튼을 눌러주세요</div>
    </div>
    <button id="generate-btn">번호 추첨하기</button>
</div>

<script>
    const btn = document.getElementById('generate-btn');
    const container = document.getElementById('results-container');

    function getBallClass(num) {
        if (num <= 10) return 'range-1';
        if (num <= 20) return 'range-2';
        if (num <= 30) return 'range-3';
        if (num <= 40) return 'range-4';
        return 'range-5';
    }

    function generateLottoSet() {
        const numbers = new Set();
        while (numbers.size < 6) {
            numbers.add(Math.floor(Math.random() * 45) + 1);
        }
        return Array.from(numbers).sort((a, b) => a - b);
    }

    function renderSets() {
        container.innerHTML = '';
        
        for (let i = 0; i < 5; i++) {
            const row = document.createElement('div');
            row.className = 'lotto-row';
            row.style.animationDelay = `${i * 0.1}s`;
            
            const numbers = generateLottoSet();
            
            numbers.forEach(num => {
                const ball = document.createElement('div');
                ball.className = `ball ${getBallClass(num)}`;
                ball.textContent = num;
                row.appendChild(ball);
            });
            
            container.appendChild(row);
        }
    }

    btn.addEventListener('click', renderSets);
</script>

</body>
</html>
